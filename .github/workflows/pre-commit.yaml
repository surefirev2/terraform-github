---
# OWNED BY template-template — do not edit. Changes will be overwritten on the next sync.
# Source: https://github.com/surefirev2/template-template
name: pre-commit

on:  # yamllint disable-line rule:truthy
  pull_request:

# Default GITHUB_TOKEN on pull_request is too narrow for amannn/action-semantic-pull-request
# (it calls GET /repos/.../pulls/{number} and fails with "Resource not accessible by integration").
permissions:
  contents: read
  pull-requests: read

jobs:
  lint-pr-title:
    name: Validate PR titles
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: ${{ github.actor != 'pull[bot]' }}
    steps:
    - run: echo "${{ github.actor }}"
    - uses: amannn/action-semantic-pull-request@v6.1.1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  pre-commit:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6.2.0
      with:
        python-version: '3.12'
    - uses: pre-commit/action@v3.0.1
